name: maternify_app
description: Maternify — Maternal health platform for Bangladesh
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Supabase
  supabase_flutter: ^2.3.4

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.1.0

  # UI
  fl_chart: ^0.66.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  shimmer: ^3.0.0

  # Audio & Voice
  record: ^5.0.4
  just_audio: ^0.9.36
  path_provider: ^2.1.2

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Storage & Prefs
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Utils
  uuid: ^4.3.3
  image_picker: ^1.0.7
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5
  mocktail: ^1.0.3
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  retrofit_generator: ^8.1.0
  device_preview: ^1.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  generate: true
